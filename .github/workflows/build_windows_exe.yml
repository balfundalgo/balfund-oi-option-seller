name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # NOTE: shell: cmd is required — ^ line continuation is CMD syntax, not PowerShell
      - name: Build EXE with PyInstaller
        shell: cmd
        run: >
          pyinstaller --onefile --windowed
          --name "OI-Option-Seller"
          --collect-all customtkinter
          --collect-all pandas
          --hidden-import customtkinter
          --hidden-import pyotp
          --hidden-import schedule
          --hidden-import dotenv
          --hidden-import requests
          --hidden-import pandas
          --hidden-import pandas._libs.tslibs.np_datetime
          --hidden-import pandas._libs.tslibs.nattype
          --hidden-import pandas._libs.tslibs.timedeltas
          --hidden-import pandas._libs.skiplist
          --hidden-import config
          --hidden-import dhan_client
          --hidden-import dhan_token_manager
          --hidden-import expiry_selector
          --hidden-import main
          --hidden-import option_chain
          --hidden-import order_executor
          --hidden-import position_store
          --hidden-import signal_engine
          --hidden-import sl_manager
          --hidden-import strike_selector
          main_gui.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: OI-Option-Seller-Windows
          path: dist/OI-Option-Seller.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OI-Option-Seller.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
